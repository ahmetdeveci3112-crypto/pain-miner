# fly.toml — Pain Miner Backend on Fly.io

app = 'pain-miner-api'
primary_region = 'ams'

[build]

[deploy]
  strategy = 'immediate'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[http_service.concurrency]
  type = 'requests'
  hard_limit = 250
  soft_limit = 200

[mounts]
  source = 'pain_data'
  destination = '/app/data'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
